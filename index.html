<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kill banana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img id="title" src="kill banana image.png" alt="Titre du jeu Kill banana.">
    <div id="container">
        <div id="game">
            <div class="stylized_container">
                <p id="score">Score : 0</p>
            </div>
            <img id="banana" src="banane.png">
            <p id="click_texte">Tue la banane!</p>
        </div>
        <div id="shop">
            <div class="stylized_container">
                <h2 id="shop_label">Magasin</h2>
            </div>
            <div class="classic_shop_item">
                <p class="title_item">Multiplicateur de clique X3</p>
                <p class="description_item">Avec cette item, chaque clique vous rapporte 3X plus de banane tué</p>
                <div class="price_container">
                    <p class="price_label">Prix</p>
                    <p class="price">30</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
